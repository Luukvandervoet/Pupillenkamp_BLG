// ── NAV ──────────────────────────────────────────────────────
function showSection(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  ({dashboard:renderDashboard,teamklassement:renderTeamKlassement,vierkamp:renderVierkamp,penalty:renderPenalty,individueel:renderInd,teams:renderTeams,planning:renderPlanning,achtkamp:renderAchtkamp,preontbijt:renderPreOntbijt})[id]?.();
}

