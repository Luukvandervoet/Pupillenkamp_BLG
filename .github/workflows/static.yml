<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">—</h3>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Sluiten</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">✓ Opgeslagen!</div>

<script>
// ── DATA ────────────────────────────────────────────────────
const TEAMS = [
  {id:1,name:'Rood Vuur',   leader:'Thomas', color:'#DC2626',players:[{num:1,name:'Liam V.'},{num:2,name:'Noah D.'},{num:3,name:'Lucas B.'},{num:4,name:'Finn H.'},{num:5,name:'Jesse K.'},{num:6,name:'Bram T.'},{num:7,name:'Stan M.'}]},
  {id:2,name:'Blauw Staal', leader:'Sven',   color:'#2563EB',players:[{num:1,name:'Max R.'},{num:2,name:'Tom W.'},{num:3,name:'Daan P.'},{num:4,name:'Milan J.'},{num:5,name:'Ruben A.'},{num:6,name:'Lars F.'},{num:7,name:'Jens S.'}]},
  {id:3,name:'Groen Woud',  leader:'Rick',   color:'#059669',players:[{num:1,name:'Cas N.'},{num:2,name:'Timo B.'},{num:3,name:'Stef L.'},{num:4,name:'Joris C.'},{num:5,name:'Niels G.'},{num:6,name:'Pim R.'},{num:7,name:'Koen V.'}]},
  {id:4,name:'Geel Zand',   leader:'Pieter', color:'#D97706',players:[{num:1,name:'Boris H.'},{num:2,name:'Sander M.'},{num:3,name:'Thijs O.'},{num:4,name:'Rens D.'},{num:5,name:'Luuk P.'},{num:6,name:'Sem K.'},{num:7,name:'Arno W.'}]},
  {id:5,name:'Oranje Zon',  leader:'Kevin',  color:'#EA580C',players:[{num:1,name:'Dylan T.'},{num:2,name:'Jasper B.'},{num:3,name:'Floris A.'},{num:4,name:'Chris N.'},{num:5,name:'Wouter S.'},{num:6,name:'Hugo M.'},{num:7,name:'Bas L.'}]},
  {id:6,name:'Paars Veld',  leader:'Dirk',   color:'#7C3AED',players:[{num:1,name:'Rik H.'},{num:2,name:'Stijn C.'},{num:3,name:'Job B.'},{num:4,name:'Gijs F.'},{num:5,name:'Niek R.'},{num:6,name:'Derk V.'},{num:7,name:'Youri T.'}]},
  {id:7,name:'Zwart Rots',  leader:'Michiel',color:'#475569',players:[{num:1,name:'Siem W.'},{num:2,name:'Jort P.'},{num:3,name:'Ferre G.'},{num:4,name:'Axel L.'},{num:5,name:'Tijs B.'},{num:6,name:'Ewout N.'},{num:7,name:'Pier M.'}]},
  {id:8,name:'Wit Licht',   leader:'Jeroen', color:'#0891B2',players:[{num:1,name:'Elias K.'},{num:2,name:'Mats D.'},{num:3,name:'Luca V.'},{num:4,name:'Tobias S.'},{num:5,name:'Sam H.'},{num:6,name:'Felix R.'},{num:7,name:'Arne B.'}]},
];

// game_history: scores[] = points per team in TEAMS order
const GAME_HISTORY = [
  {name:'Veldspel',        klassement:'Teamklassement',type:'raw',date:'Zondag',  time:'16:00',scores:[8,7,5,6,4,3,2,1],rawScores:[18,15,10,12,8,6,5,4]},
  {name:'Avondspel',       klassement:'Teamklassement',type:'raw',date:'Zondag',  time:'20:00',scores:[6,5,8,7,3,4,1,2],rawScores:[12,10,18,15,6,8,2,4]},
  {name:'Pre-ontbijtspel', klassement:'Teamklassement',type:'raw',date:'Maandag', time:'07:30',scores:[7,8,6,5,4,3,2,1],rawScores:[16,18,14,10,8,6,4,2]},
  {name:'Voetbal Dag 2',   klassement:'Teamklassement',type:'raw',date:'Maandag', time:'17:00',scores:[8,6,7,5,3,4,2,1],rawScores:[20,14,18,10,6,8,4,2]},
];

const VK_DUELS = [
  {team1:'Rood Vuur',  team2:'Blauw Staal',games:[{name:'Koekhappen',w:1},{name:'Flessentrekker',w:2},{name:'Zaklopen',w:1},{name:'Touwtrekken',w:1}]},
  {team1:'Groen Woud', team2:'Geel Zand',  games:[{name:'Koekhappen',w:2},{name:'Flessentrekker',w:1},{name:'Zaklopen',w:0},{name:'Touwtrekken',w:2}]},
  {team1:'Oranje Zon', team2:'Paars Veld', games:[{name:'Koekhappen',w:1},{name:'Flessentrekker',w:1},{name:'Zaklopen',w:2},{name:'Touwtrekken',w:1}]},
];

const PLAYERS_ALL = TEAMS.flatMap(t=>t.players.map(p=>({...p,team:t.name,teamId:t.id,color:t.color,indPts:Math.floor(Math.random()*20)})));

// ── PENALTY DATA ─────────────────────────────────────────────
const KAMPdagen = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag'];
const KAMPLAGEN = KAMPdagen;
const LEADERS = TEAMS.map(t => t.leader);

// Keepers per dag: dagIndex → [keeper1, keeper2]
const penKeepersPerDag = { 0:['',''], 1:['',''], 2:['',''], 3:['',''], 4:['',''] };

// Verdubbelaar: spelerNaam → dagIndex (0-4) | null
const penVerdubbelaar = {};
PLAYERS_ALL.forEach(p => { penVerdubbelaar[p.name] = null; });

// Pogingen: dagIndex → [ {spelerNaam, keeperNaam, goal:bool|null, verdubbelaar:bool} ]
const penData = KAMPdagen.map(dag => ({ dag, pogingen: [], opgeslagen: false }));

// Huidige dag voor invoer
let penHuidigeDag = 0;

// Finale config
const penFinale = {
  drempel: null,
  rondes: [],
  handmatigDeelnemers: null,
  actieveRonde: null,
  schietBeurt: 0,
};

// ── PENALTY HELPERS ───────────────────────────────────────────
function penTotaalSpeler(naam) {
  let pts = 0;
  penData.forEach(dag => {
    dag.pogingen.filter(p => p.spelerNaam === naam).forEach(p => {
      const g = p.goal ? 1 : 0;
      pts += p.verdubbelaar ? g * 2 : g;
    });
  });
  return pts;
}

function penDagTotaalSpeler(naam, dagIdx) {
  let pts = 0;
  penData[dagIdx].pogingen.filter(p => p.spelerNaam === naam).forEach(p => {
    const g = p.goal ? 1 : 0;
    pts += p.verdubbelaar ? g * 2 : g;
  });
  return pts;
}

function penDagGoalsSpeler(naam, dagIdx) {
  return penData[dagIdx].pogingen.filter(p => p.spelerNaam === naam && p.goal === true).length;
}

function penDagTegengoalsKeeper(keeperNaam, dagIdx) {
  let goals = 0, total = 0;
  penData[dagIdx].pogingen.filter(p => p.keeperNaam === keeperNaam).forEach(p => {
    if(p.goal) goals++;
    total++;
  });
  return { goals, total };
}

function penKwalificeerden() {
  if(penFinale.handmatigDeelnemers) return penFinale.handmatigDeelnemers;
  if(penFinale.drempel === null) return [];
  return PLAYERS_ALL
    .filter(p => penTotaalSpeler(p.name) >= penFinale.drempel)
    .map(p => p.name)
    .sort((a,b) => penTotaalSpeler(b) - penTotaalSpeler(a));
}

// ── RENDER PENALTY ────────────────────────────────────────────
function renderPenalty() {
  renderPenSetup();
  renderPenInvoer();
  renderPenSpelers();
  renderPenKeepers();
  renderPenHistorie();
  renderPenFinale();
}

// ── SETUP TAB ─────────────────────────────────────────────────
function renderPenSetup() {
  const el = document.getElementById('pen-setup');
  if(!el) return;

  // Keepers per dag
  let html = `<div class="card" style="margin-bottom:12px">
    <div class="card-title">🧤 Keepers instellen per dag</div>
    <div class="alert alert-info" style="margin-bottom:12px">Stel per dag 2 keepers in. Zodra ingesteld worden ze automatisch overgenomen in de invoer.</div>`;
  KAMPdagen.forEach((dag, i) => {
    const k = penKeepersPerDag[i];
    html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:600;font-size:.88rem;width:80px;flex-shrink:0">${dag}</div>
      <select onchange="penSetKeeper(${i},0,this.value)" style="flex:1;padding:6px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.82rem;color:var(--text)">
        <option value="">Keeper 1...</option>
        ${LEADERS.map(l=>`<option value="${l}" ${k[0]===l?'selected':''}>${l}</option>`).join('')}
      </select>
      <select onchange="penSetKeeper(${i},1,this.value)" style="flex:1;padding:6px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.82rem;color:var(--text)">
        <option value="">Keeper 2...</option>
        ${LEADERS.map(l=>`<option value="${l}" ${k[1]===l?'selected':''}>${l}</option>`).join('')}
      </select>
      <span style="font-size:.75rem;color:${k[0]&&k[1]?'var(--green)':'var(--muted)'}">
        ${k[0]&&k[1]?'✓ ingesteld':'open'}
      </span>
    </div>`;
  });
  html += `</div>`;

  // Verdubbelaar per speler
  html += `<div class="card" style="margin-bottom:12px">
    <div class="card-title">🎯 Verdubbelaar instellen — begin van de week</div>
    <div class="alert alert-warning" style="margin-bottom:12px">Elke speler kiest 1 dag waarop zijn goals dubbel tellen. Stel dit aan het begin van de week in.</div>`;
  TEAMS.forEach(t => {
    html += `<div style="margin-bottom:10px">
      <div style="font-weight:700;font-size:.85rem;color:${t.color};margin-bottom:6px">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.color};margin-right:6px"></span>${t.name}
      </div>`;
    t.players.forEach(p => {
      const vdag = penVerdubbelaar[p.name];
      html += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
        <span style="font-family:'DM Mono',monospace;color:var(--accent);font-size:.78rem;width:24px">#${p.num}</span>
        <span style="font-weight:600;font-size:.85rem;flex:1">${p.name}</span>
        <select onchange="penSetVerdubbelaarSetup('${p.name}',this.value)" style="padding:5px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.8rem;color:var(--text)">
          <option value="">Geen dag gekozen</option>
          ${KAMPdagen.map((dag,i)=>`<option value="${i}" ${vdag===i?'selected':''}>${dag}</option>`).join('')}
        </select>
        ${vdag!==null?`<span style="font-size:.7rem;padding:2px 7px;border-radius:20px;background:#FDF4FF;color:#A21CAF;white-space:nowrap">2× ${KAMPdagen[vdag]}</span>`:''}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  // Finale drempel
  html += `<div class="card">
    <div class="card-title">🏆 Finale kwalificatie</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
      <label style="font-size:.85rem;font-weight:600">Minimaal aantal punten voor finale:</label>
      <input type="number" min="0" max="20" value="${penFinale.drempel??''}" placeholder="bijv. 5"
        style="width:80px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:6px;font-family:'DM Mono',monospace;font-size:.88rem"
        onchange="penFinale.drempel=this.value===''?null:parseInt(this.value);renderPenSetup();renderPenFinale()">
      <span style="font-size:.82rem;color:var(--muted)">${penFinale.drempel!==null?`→ ${penKwalificeerden().length} spelers kwalificeren`:'(leeg = handmatig kiezen)'}</span>
    </div>
    ${penFinale.drempel===null?`<div class="alert alert-info">Laat de drempel leeg om in het Finale-tabblad handmatig deelnemers te selecteren.</div>`:''}
    ${penFinale.drempel!==null&&penKwalificeerden().length>0?`<div style="font-size:.82rem;color:var(--muted)">Gekwalificeerd: ${penKwalificeerden().join(', ')}</div>`:''}
  </div>`;

  el.innerHTML = html;
}

function penSetKeeper(dagIdx, slot, val) {
  penKeepersPerDag[dagIdx][slot] = val;
  renderPenSetup();
}

function penSetVerdubbelaarSetup(naam, val) {
  penVerdubbelaar[naam] = val === '' ? null : parseInt(val);
  // Update bestaande pogingen
  penData.forEach((dag, i) => {
    dag.pogingen.filter(p => p.spelerNaam === naam).forEach(p => {
      p.verdubbelaar = penVerdubbelaar[naam] === i;
    });
  });
  renderPenSetup();
}

// ── INVOER TAB ────────────────────────────────────────────────
function renderPenInvoer() {
  const el = document.getElementById('pen-invoer');
  if(!el) return;

  let html = `<div class="card" style="margin-bottom:12px">
    <div class="card-title">Dag selecteren</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">`;
  KAMPdagen.forEach((dag, i) => {
    const done = penData[i].opgeslagen;
    const active = i === penHuidigeDag;
    html += `<button class="btn ${active?'btn-primary':'btn-outline'}" style="font-size:.78rem;padding:6px 12px" onclick="penSetDag(${i})">${dag}${done?' ✓':''}</button>`;
  });
  html += `</div></div>`;

  const dagData = penData[penHuidigeDag];
  const keepers = penKeepersPerDag[penHuidigeDag];
  const keeper1 = keepers[0] || '?';
  const keeper2 = keepers[1] || '?';
  const keepersOk = keepers[0] && keepers[1];

  html += `<div class="alert ${keepersOk?'alert-info':'alert-warning'}">
    📅 <strong>${KAMPdagen[penHuidigeDag]}</strong> —
    Keeper 1: <strong>${keeper1}</strong> · Keeper 2: <strong>${keeper2}</strong>
    ${!keepersOk?'<br>⚠️ Stel eerst de keepers in via het ⚙️ Instellen tabblad.':''}
  </div>`;

  TEAMS.forEach(t => {
    html += `<div class="ak-subgame" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${t.color}"></span>
        <strong style="color:${t.color}">${t.name}</strong>
        <span style="font-size:.75rem;color:var(--muted)">— ${t.leader}</span>
      </div>`;

    t.players.forEach(p => {
      const fullName = p.name;
      const verdVandaag = penVerdubbelaar[fullName] === penHuidigeDag;
      const heeftVerd = penVerdubbelaar[fullName] !== null;
      const bestaand = dagData.pogingen.filter(x => x.spelerNaam === fullName);
      const p1 = bestaand[0] || null;
      const p2 = bestaand[1] || null;
      const dagPts = penDagTotaalSpeler(fullName, penHuidigeDag);
      const totPts = penTotaalSpeler(fullName);

      html += `<div style="border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;background:var(--bg)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          <span style="font-family:'DM Mono',monospace;color:var(--accent);font-size:.8rem">#${p.num}</span>
          <span style="font-weight:700;font-size:.88rem;flex:1">${fullName}</span>
          ${verdVandaag?`<span style="font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:20px;background:#FDF4FF;color:#A21CAF;border:1px solid #F0ABFC">2× vandaag</span>`:''}
          ${heeftVerd&&!verdVandaag?`<span style="font-size:.7rem;color:var(--muted-light)">2× op ${KAMPdagen[penVerdubbelaar[fullName]]}</span>`:''}
          <span style="font-family:'DM Mono',monospace;font-size:.8rem;color:var(--accent);font-weight:700">${dagPts}pt · ${totPts}pt tot</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${penShotRow(fullName, 0, p1, dagData.opgeslagen, keeper1)}
          ${penShotRow(fullName, 1, p2, dagData.opgeslagen, keeper2)}
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  if(!dagData.opgeslagen) {
    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      <button class="btn btn-primary" onclick="penOpslaanDag()">✓ ${KAMPdagen[penHuidigeDag]} opslaan</button>
      <button class="btn btn-outline" onclick="penOpslaanDag(true)" style="font-size:.78rem">🔓 Opslaan (blijft bewerkbaar)</button>
    </div>`;
  } else {
    html += `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="alert alert-success" style="margin:0;flex:1">✓ ${KAMPdagen[penHuidigeDag]} opgeslagen.</div>
      <button class="btn btn-outline" style="font-size:.78rem" onclick="penHeropen(${penHuidigeDag})">🔓 Heropenen (admin)</button>
    </div>`;
  }

  el.innerHTML = html;
}

function penShotRow(spelerNaam, shotIdx, bestaand, opgeslagen, defaultKeeper) {
  const keeperVal = bestaand?.keeperNaam || defaultKeeper || '';
  const goalVal = bestaand?.goal;
  const safeId = spelerNaam.replace(/[^a-z0-9]/gi,'');

  if(opgeslagen) {
    const goalLabel = goalVal === true ? '⚽ Goal' : goalVal === false ? '✗ Mis' : '—';
    return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:.82rem">
      <div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:4px">Penalty ${shotIdx+1}</div>
      <div style="font-weight:600">${keeperVal||'—'}</div>
      <div style="color:${goalVal===true?'var(--green)':goalVal===false?'var(--red)':'var(--muted)'};font-weight:700;margin-top:2px">${goalLabel}</div>
      <button onclick="penAdminEdit('${spelerNaam}',${penHuidigeDag},${shotIdx})" style="margin-top:6px;font-size:.68rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border-dark);background:transparent;cursor:pointer;color:var(--muted)">✏️ aanpassen</button>
    </div>`;
  }

  return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px">
    <div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:6px">Penalty ${shotIdx+1}</div>
    <select id="pen-${safeId}-${shotIdx}-keeper"
      style="width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.8rem;color:var(--text);margin-bottom:6px"
      onchange="penUpdateShot('${spelerNaam}',${shotIdx})">
      <option value="">Keeper...</option>
      ${LEADERS.map(l=>`<option value="${l}" ${keeperVal===l?'selected':''}>${l}</option>`).join('')}
    </select>
    <div style="display:flex;gap:4px">
      <button class="pen-btn ${goalVal===true?'goal':''}" style="flex:1;padding:7px 0" onclick="penToggleGoal('${spelerNaam}',${shotIdx},true)">⚽</button>
      <button class="pen-btn" style="flex:1;padding:7px 0;${goalVal===false?'background:var(--red-bg);border-color:#FECACA;color:var(--red)':''}" onclick="penToggleGoal('${spelerNaam}',${shotIdx},false)">✗</button>
    </div>
  </div>`;
}

function penUpdateShot(spelerNaam, shotIdx) {
  const dagData = penData[penHuidigeDag];
  const safeId = spelerNaam.replace(/[^a-z0-9]/gi,'');
  const keeper = document.getElementById(`pen-${safeId}-${shotIdx}-keeper`)?.value || '';
  const existing = dagData.pogingen.filter(p => p.spelerNaam === spelerNaam);
  if(!existing[shotIdx]) {
    dagData.pogingen.push({spelerNaam, keeperNaam:keeper, goal:null, verdubbelaar: penVerdubbelaar[spelerNaam]===penHuidigeDag});
  } else {
    existing[shotIdx].keeperNaam = keeper;
  }
}

function penToggleGoal(spelerNaam, shotIdx, isGoal) {
  const dagData = penData[penHuidigeDag];
  const safeId = spelerNaam.replace(/[^a-z0-9]/gi,'');
  const keeper = document.getElementById(`pen-${safeId}-${shotIdx}-keeper`)?.value || penKeepersPerDag[penHuidigeDag][shotIdx] || '';
  const existing = dagData.pogingen.filter(p => p.spelerNaam === spelerNaam);
  const verdVandaag = penVerdubbelaar[spelerNaam] === penHuidigeDag;
  if(!existing[shotIdx]) {
    dagData.pogingen.push({spelerNaam, keeperNaam:keeper, goal:isGoal, verdubbelaar:verdVandaag});
  } else {
    existing[shotIdx].goal = existing[shotIdx].goal === isGoal ? null : isGoal;
    existing[shotIdx].keeperNaam = keeper || existing[shotIdx].keeperNaam;
    existing[shotIdx].verdubbelaar = verdVandaag;
  }
  renderPenInvoer();
}

function penAdminEdit(spelerNaam, dagIdx, shotIdx) {
  // Heropen tijdelijk voor admin aanpassing
  const dagData = penData[dagIdx];
  const bestaand = dagData.pogingen.filter(p => p.spelerNaam === spelerNaam)[shotIdx];
  const keepers = penKeepersPerDag[dagIdx];

  document.getElementById('modal-title').textContent = `Aanpassen: ${spelerNaam}`;
  document.getElementById('modal-sub').textContent = `Penalty ${shotIdx+1} · ${KAMPdagen[dagIdx]}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:12px">
      <label style="font-size:.75rem;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">Keeper</label>
      <select id="admin-keeper" style="width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:6px;font-size:.88rem">
        <option value="">—</option>
        ${LEADERS.map(l=>`<option value="${l}" ${bestaand?.keeperNaam===l?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    <div>
      <label style="font-size:.75rem;font-weight:700;color:var(--muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Resultaat</label>
      <div style="display:flex;gap:8px">
        <button id="admin-goal" class="btn ${bestaand?.goal===true?'btn-green':'btn-outline'}" style="flex:1" onclick="document.getElementById('admin-goal').className='btn btn-green';document.getElementById('admin-mis').className='btn btn-outline'">⚽ Goal</button>
        <button id="admin-mis" class="btn ${bestaand?.goal===false?'btn-danger':'btn-outline'}" style="flex:1" onclick="document.getElementById('admin-mis').className='btn btn-danger';document.getElementById('admin-goal').className='btn btn-outline'">✗ Mis</button>
      </div>
    </div>`;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Annuleren</button>
    <button class="btn btn-primary" onclick="penAdminSave('${spelerNaam}',${dagIdx},${shotIdx})">✓ Opslaan</button>`;
  openModal();
}

function penAdminSave(spelerNaam, dagIdx, shotIdx) {
  const keeper = document.getElementById('admin-keeper').value;
  const goalBtn = document.getElementById('admin-goal');
  const isGoal = goalBtn.className.includes('btn-green') ? true : false;
  const existing = penData[dagIdx].pogingen.filter(p => p.spelerNaam === spelerNaam);
  if(existing[shotIdx]) {
    existing[shotIdx].keeperNaam = keeper;
    existing[shotIdx].goal = isGoal;
  }
  closeModal();
  showToast('✓ Penalty aangepast!');
  renderPenalty();
}

function penSetDag(idx) { penHuidigeDag = idx; renderPenInvoer(); }

function penOpslaanDag(blijftBewerkbaar) {
  if(!blijftBewerkbaar) penData[penHuidigeDag].opgeslagen = true;
  showToast(`✓ ${KAMPdagen[penHuidigeDag]} opgeslagen!`);
  renderPenalty();
}

function penHeropen(dagIdx) {
  penData[dagIdx].opgeslagen = false;
  showToast(`🔓 ${KAMPdagen[dagIdx]} heropend`);
  renderPenInvoer();
}

// ── SPELERS TAB ───────────────────────────────────────────────
function renderPenSpelers() {
  const el = document.getElementById('pen-spelers');
  if(!el) return;
  const sorted = [...PLAYERS_ALL].map(p=>({...p,pts:penTotaalSpeler(p.name)})).sort((a,b)=>b.pts-a.pts);
  const max = sorted[0]?.pts || 1;
  let html = '';
  sorted.forEach(p => {
    const rang = sorted.filter(x=>x.pts>p.pts).length+1;
    const medal = rang===1?'🥇':rang===2?'🥈':rang===3?'🥉':'';
    const vdag = penVerdubbelaar[p.name];
    html += `<div class="lb-row rank-${rang<=3?rang:99}">
      <div class="rank-num">${rang}</div><div class="rank-medal">${medal}</div>
      <div class="rank-name">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px"></span>
        ${p.name} <span style="color:var(--muted-light);font-size:.75rem;margin-left:4px">${p.team}</span>
        ${vdag!==null?`<span style="font-size:.65rem;padding:1px 5px;border-radius:20px;background:#FDF4FF;color:#A21CAF;margin-left:4px">2× ${KAMPdagen[vdag].slice(0,2)}</span>`:''}
      </div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(p.pts/max*100)}%"></div></div>
      <div class="rank-pts">${p.pts}pt</div>
    </div>`;
  });
  el.innerHTML = html || '<div class="alert alert-info">Nog geen scores.</div>';
}

// ── KEEPERS TAB ───────────────────────────────────────────────
function renderPenKeepers() {
  const el = document.getElementById('pen-keepers');
  if(!el) return;
  const keeperStats = LEADERS.map(naam => {
    let totGoals=0, totPogingen=0;
    const perDag = KAMPdagen.map((dag,i)=>{
      const {goals,total}=penDagTegengoalsKeeper(naam,i);
      totGoals+=goals; totPogingen+=total;
      return {dag,goals,total};
    });
    return {naam,totGoals,totPogingen,perDag};
  }).sort((a,b)=>a.totGoals-b.totGoals);

  let html = `<div class="alert alert-info" style="margin-bottom:14px">🧤 Gesorteerd op minste tegengoals.</div>`;
  keeperStats.forEach((k,i)=>{
    const pct = k.totPogingen>0?Math.round((1-k.totGoals/k.totPogingen)*100):100;
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    html += `<div class="ak-subgame" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span>${medal||i+1}</span>
        <span style="font-weight:700;font-size:.95rem;flex:1">🧤 ${k.naam}</span>
        <span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--red)">${k.totGoals} tegen</span>
        <span style="font-family:'DM Mono',monospace;font-size:.82rem;color:var(--green)">${pct}% gestopt</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
        ${k.perDag.map(d=>`<div style="text-align:center;background:var(--bg3);border-radius:5px;padding:5px 2px;font-size:.72rem">
          <div style="color:var(--muted);margin-bottom:2px">${d.dag.slice(0,2)}</div>
          <div style="font-weight:700;color:${d.total===0?'var(--muted-light)':d.goals===0?'var(--green)':'var(--red)'}">${d.total===0?'—':`${d.goals}/${d.total}`}</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

// ── PER DAG TAB ───────────────────────────────────────────────
function renderPenHistorie() {
  const el = document.getElementById('pen-historie');
  if(!el) return;
  let html = '';
  KAMPdagen.forEach((dag,dagIdx)=>{
    const dagData=penData[dagIdx];
    const goals=dagData.pogingen.filter(p=>p.goal).length;
    const n=dagData.pogingen.length;
    const keepers=penKeepersPerDag[dagIdx];
    html += `<div class="day-header">📅 ${dag} <span style="font-size:.75rem;font-weight:400;color:var(--muted);letter-spacing:0">${dagData.opgeslagen?'✓':'open'} · ${goals}/${n} goals · 🧤 ${keepers[0]||'?'} & ${keepers[1]||'?'}</span></div>`;
    if(n===0){
      html+=`<div style="font-size:.83rem;color:var(--muted);padding:8px 12px">Nog geen pogingen.</div>`;
    } else {
      const spelers=[...new Set(dagData.pogingen.map(p=>p.spelerNaam))];
      spelers.forEach(naam=>{
        const player=PLAYERS_ALL.find(p=>p.name===naam);
        const pogingen=dagData.pogingen.filter(p=>p.spelerNaam===naam);
        const pts=penDagTotaalSpeler(naam,dagIdx);
        const verdToday=penVerdubbelaar[naam]===dagIdx;
        html+=`<div class="activity-row" style="margin-bottom:3px">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${player?.color||'#ccc'};flex-shrink:0"></span>
          <div style="font-weight:600;font-size:.85rem;flex:1">${naam} <span style="color:var(--muted-light);font-size:.75rem">${player?.team||''}</span></div>
          ${pogingen.map(p=>`<span style="font-size:.78rem;padding:2px 8px;border-radius:20px;background:${p.goal?'var(--green-bg)':'var(--red-bg)'};color:${p.goal?'var(--green)':'var(--red)'};font-weight:600">${p.goal?'⚽':'✗'} ${p.keeperNaam||'?'}</span>`).join('')}
          ${verdToday?`<span style="font-size:.7rem;padding:2px 6px;border-radius:20px;background:#FDF4FF;color:#A21CAF">2×</span>`:''}
          <span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--accent);font-size:.85rem">${pts}pt</span>
        </div>`;
      });
    }
  });
  el.innerHTML = html;
}

// ── FINALE TAB ────────────────────────────────────────────────
// penFinale.actieveRonde: welke ronde je nu live aan het schieten bent (index)
// penFinale.schietBeurt: index in de schietvolgorde (welke speler × welke penalty)

function renderPenFinale() {
  const el = document.getElementById('pen-finale');
  if(!el) return;

  const kwal = penKwalificeerden();

  // ── DEELNEMERS BLOK ──
  let html = `<div class="card" style="margin-bottom:12px">
    <div class="card-title">🏆 Finale — deelnemers</div>`;

  if(penFinale.drempel!==null && kwal.length>0) {
    html+=`<div class="alert alert-success" style="margin-bottom:8px">✓ ${kwal.length} spelers gekwalificeerd (≥${penFinale.drempel} punten)</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${kwal.map(n=>{ const p=PLAYERS_ALL.find(x=>x.name===n);
          return `<span style="font-size:.8rem;padding:3px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border-dark);font-weight:600">
            <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${p?.color||'#ccc'};margin-right:4px"></span>${n}</span>`;
        }).join('')}
      </div>`;
  } else {
    html+=`<div class="alert alert-info" style="margin-bottom:8px">Stel een drempel in via ⚙️ Instellen, of kies handmatig:</div>
      <div>`;
    PLAYERS_ALL.forEach(p=>{
      const pts=penTotaalSpeler(p.name);
      const inF=penFinale.handmatigDeelnemers?.includes(p.name);
      html+=`<label style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer">
        <input type="checkbox" ${inF?'checked':''} onchange="penToggleFinaleDeelnemer('${p.name}',this.checked)" style="width:16px;height:16px;accent-color:var(--accent)">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color}"></span>
        <span style="font-weight:600;font-size:.85rem;flex:1">${p.name} <span style="color:var(--muted-light);font-size:.75rem">${p.team}</span></span>
        <span style="font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent)">${pts}pt</span>
      </label>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;

  const deelnemers = kwal.length>0 ? kwal : (penFinale.handmatigDeelnemers||[]);
  if(deelnemers.length===0){
    el.innerHTML=html+'<div class="alert alert-info">Stel deelnemers in om het schema te zien.</div>';
    return;
  }

  // ── SCHEMA OPBOUWEN ──
  html+=`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="penInitRondes()">🔄 ${penFinale.rondes.length?'Schema opnieuw opbouwen':'Schema opbouwen'} (${deelnemers.length} spelers)</button>
      ${penFinale.rondes.length?`<span style="font-size:.8rem;color:var(--green);font-weight:600">✓ ${penFinale.rondes.length} rondes aangemaakt</span>`:''}
    </div>
  </div>`;

  if(penFinale.rondes.length===0){ el.innerHTML=html; return; }

  // ── RONDES ──
  penFinale.rondes.forEach((ronde,ri)=>{
    const afgerond = ronde.doorgang!==null;
    const isActief = penFinale.actieveRonde===ri;

    // Bouw schietvolgorde: speler1-pen1, speler2-pen1, ..., speler1-pen2, speler2-pen2, ...
    // (elke ronde: alle spelers schieten om beurten, dan volgende penalty)
    const volgorde = []; // [{naam, penIdx}]
    for(let pi=0; pi<ronde.penPerSpeler; pi++){
      for(let si=0; si<ronde.deelnemers.length; si++){
        volgorde.push({naam:ronde.deelnemers[si], penIdx:pi});
      }
    }
    const totaalSchoten = volgorde.length;
    const gedaan = volgorde.filter(v=>ronde.resultaten[v.naam]?.goals[v.penIdx]!==undefined && ronde.resultaten[v.naam]?.goals[v.penIdx]!==null).length;
    const beurtIdx = penFinale.actieveRonde===ri ? (penFinale.schietBeurt??0) : -1;

    html+=`<div class="ak-subgame" style="margin-bottom:12px;${afgerond?'opacity:.85':''}">
      <!-- Ronde header -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);letter-spacing:1px">${ronde.naam}</div>
        <div style="font-size:.78rem;color:var(--muted);flex:1">${ronde.deelnemers.length} spelers · ${ronde.penPerSpeler} pen/speler · keeper: <strong>${ronde.keeper||'?'}</strong></div>
        ${afgerond?`<span style="font-size:.75rem;padding:3px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:700">✓ Afgesloten</span>`:''}
      </div>

      <!-- Instellingen (verberg als afgesloten) -->
      ${!afgerond?`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:6px">
          <label style="font-size:.75rem;font-weight:700;color:var(--muted)">KEEPER</label>
          <select onchange="penFinale.rondes[${ri}].keeper=this.value;renderPenFinale()" style="padding:5px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.82rem;color:var(--text)">
            <option value="">Kies...</option>
            ${LEADERS.map(l=>`<option value="${l}" ${ronde.keeper===l?'selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <label style="font-size:.75rem;font-weight:700;color:var(--muted)">PEN/SPELER</label>
          <input type="number" min="1" max="10" value="${ronde.penPerSpeler}"
            onchange="penFinale.rondes[${ri}].penPerSpeler=parseInt(this.value)||1;penFinaleHerbereken(${ri});renderPenFinale()"
            style="width:55px;padding:5px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-family:'DM Mono',monospace;font-size:.85rem;text-align:center">
        </div>
        <button class="btn btn-primary" style="font-size:.78rem;padding:6px 14px" onclick="penStartRonde(${ri})">
          ${isActief?'⏸ Actief — klik schietvolgorde':'▶ Start schietvolgorde'}
        </button>
      </div>`:''}

      <!-- SCHIETVOLGORDE — live schema -->
      <div style="margin-bottom:10px">
        <div style="font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">
          Schietvolgorde ${gedaan}/${totaalSchoten} geschoten
        </div>

        <!-- Penalty ronden header -->
        ${Array.from({length:ronde.penPerSpeler},(_,pi)=>{
          const penGedaan = ronde.deelnemers.filter(n=>ronde.resultaten[n]?.goals[pi]!==undefined&&ronde.resultaten[n]?.goals[pi]!==null).length;
          return `<div style="margin-bottom:8px">
            <div style="font-size:.72rem;font-weight:700;letter-spacing:.5px;color:var(--accent);padding:4px 8px;background:var(--bg2);border-radius:5px;margin-bottom:4px;display:inline-block">
              Penalty ${pi+1} van ${ronde.penPerSpeler} · keeper: ${ronde.keeper||'?'}
            </div>
            <div style="display:flex;flex-direction:column;gap:3px">
              ${ronde.deelnemers.map((naam,si)=>{
                const vIdx = pi*ronde.deelnemers.length + si;
                const isBeurt = isActief && beurtIdx===vIdx;
                const g = ronde.resultaten[naam]?.goals[pi];
                const gedaanV = g!==undefined&&g!==null;
                const player = PLAYERS_ALL.find(p=>p.name===naam);
                const doorgegaan = ronde.doorgang?.includes(naam);
                return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
                  border:${isBeurt?'2px solid var(--accent)':'1px solid var(--border)'};
                  background:${isBeurt?'var(--accent-bg)':gedaanV?'var(--bg2)':'var(--bg)'};
                  ${isBeurt?'box-shadow:0 0 0 3px rgba(37,99,235,.12)':''}">
                  ${isBeurt?`<span style="font-size:1rem">👉</span>`:`<span style="width:20px;text-align:center;font-size:.9rem">${doorgegaan===true?'✅':doorgegaan===false?'❌':si+1+(pi*ronde.deelnemers.length)+1>gedaan?'○':'·'}</span>`}
                  <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${player?.color||'#ccc'};flex-shrink:0"></span>
                  <span style="font-weight:${isBeurt?'800':'600'};font-size:.88rem;flex:1;${isBeurt?'color:var(--accent)':''}">${naam}</span>
                  ${isBeurt&&!afgerond?`
                    <button onclick="penFinaleSchiet(${ri},${vIdx},true)" style="padding:8px 14px;border-radius:6px;border:2px solid var(--green);background:var(--green-bg);color:var(--green);font-weight:800;font-size:.9rem;cursor:pointer">⚽</button>
                    <button onclick="penFinaleSchiet(${ri},${vIdx},false)" style="padding:8px 14px;border-radius:6px;border:2px solid var(--red);background:var(--red-bg);color:var(--red);font-weight:800;font-size:.9rem;cursor:pointer">✗</button>
                  `:`<span style="font-size:1.1rem;min-width:28px;text-align:center">${g===true?'⚽':g===false?'✗':'—'}</span>`}
                  <span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--accent);font-size:.82rem;min-width:20px;text-align:right">
                    ${ronde.resultaten[naam]?.goals.filter(x=>x===true).length??0}
                  </span>
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>

      <!-- Tussenstand -->
      ${gedaan>0?`<div style="padding:10px;background:var(--bg2);border-radius:8px;margin-bottom:10px;border:1px solid var(--border)">
        <div style="font-size:.7rem;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:6px">TUSSENSTAND</div>
        ${[...ronde.deelnemers].sort((a,b)=>(ronde.resultaten[b]?.goals.filter(x=>x===true).length||0)-(ronde.resultaten[a]?.goals.filter(x=>x===true).length||0))
          .map((naam,i)=>{
            const g=ronde.resultaten[naam]?.goals.filter(x=>x===true).length||0;
            const doorgegaan=ronde.doorgang?.includes(naam);
            const player=PLAYERS_ALL.find(p=>p.name===naam);
            return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:.85rem;width:18px">${doorgegaan===true?'✅':doorgegaan===false?'❌':i+1}</span>
              <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${player?.color||'#ccc'}"></span>
              <span style="font-weight:600;font-size:.85rem;flex:1">${naam}</span>
              <span style="font-family:'DM Mono',monospace;font-weight:800;font-size:.9rem;color:var(--accent)">${g} ⚽</span>
            </div>`;
          }).join('')}
      </div>`:''}

      <!-- Afsluiten -->
      ${!afgerond?`<button class="btn btn-primary" style="font-size:.78rem" onclick="penRondeBeslissen(${ri})">✓ ${ronde.naam} afsluiten & doorgang bepalen</button>`:''}
      ${afgerond?`<div class="alert alert-success" style="margin-top:0">
        Door naar volgende ronde: <strong>${ronde.doorgang.join(', ')}</strong>
      </div>`:''}
    </div>`;
  });

  el.innerHTML = html;
}

function penToggleFinaleDeelnemer(naam, checked) {
  if(!penFinale.handmatigDeelnemers) penFinale.handmatigDeelnemers=[];
  if(checked){ if(!penFinale.handmatigDeelnemers.includes(naam)) penFinale.handmatigDeelnemers.push(naam); }
  else { penFinale.handmatigDeelnemers=penFinale.handmatigDeelnemers.filter(n=>n!==naam); }
  renderPenFinale();
}

function penInitRondes() {
  const deelnemers = penKwalificeerden().length>0 ? penKwalificeerden() : (penFinale.handmatigDeelnemers||[]);
  if(deelnemers.length===0){showToast('⚠️ Geen deelnemers');return;}

  penFinale.rondes=[];
  penFinale.actieveRonde=null;
  penFinale.schietBeurt=0;

  const rondeNamen=['Kwartfinale','Halve finale','Finale'];
  let huidig=[...deelnemers];

  while(huidig.length>1 && penFinale.rondes.length<3){
    const naam=rondeNamen[penFinale.rondes.length]||`Ronde ${penFinale.rondes.length+1}`;
    const res={};
    huidig.forEach(n=>{res[n]={goals:[]};});
    penFinale.rondes.push({naam, deelnemers:[...huidig], penPerSpeler:3, keeper:'', resultaten:res, doorgang:null});
    huidig=huidig.slice(0,Math.ceil(huidig.length/2));
  }
  showToast(`🏆 ${penFinale.rondes.length} rondes aangemaakt!`);
  renderPenFinale();
}

function penFinaleHerbereken(ri){
  // Als penPerSpeler verandert, reset de goals arrays
  const ronde=penFinale.rondes[ri];
  ronde.deelnemers.forEach(n=>{
    if(!ronde.resultaten[n]) ronde.resultaten[n]={goals:[]};
    ronde.resultaten[n].goals=ronde.resultaten[n].goals.slice(0,ronde.penPerSpeler);
  });
}

function penStartRonde(ri){
  penFinale.actieveRonde=ri;
  penFinale.schietBeurt=0;
  // Zoek eerste nog niet geschoten beurt
  const ronde=penFinale.rondes[ri];
  const volgorde=penFinaleVolgorde(ri);
  for(let i=0;i<volgorde.length;i++){
    const {naam,penIdx}=volgorde[i];
    const g=ronde.resultaten[naam]?.goals[penIdx];
    if(g===undefined||g===null){penFinale.schietBeurt=i;break;}
  }
  renderPenFinale();
}

function penFinaleVolgorde(ri){
  const ronde=penFinale.rondes[ri];
  const v=[];
  for(let pi=0;pi<ronde.penPerSpeler;pi++)
    for(let si=0;si<ronde.deelnemers.length;si++)
      v.push({naam:ronde.deelnemers[si],penIdx:pi});
  return v;
}

function penFinaleSchiet(ri, vIdx, isGoal){
  const ronde=penFinale.rondes[ri];
  const volgorde=penFinaleVolgorde(ri);
  const {naam,penIdx}=volgorde[vIdx];
  if(!ronde.resultaten[naam]) ronde.resultaten[naam]={goals:[]};
  while(ronde.resultaten[naam].goals.length<=penIdx) ronde.resultaten[naam].goals.push(null);
  ronde.resultaten[naam].goals[penIdx]=isGoal;

  // Ga naar volgende beurt
  let volgende=vIdx+1;
  while(volgende<volgorde.length){
    const {naam:vn,penIdx:vp}=volgorde[volgende];
    if(ronde.resultaten[vn]?.goals[vp]===undefined||ronde.resultaten[vn]?.goals[vp]===null) break;
    volgende++;
  }
  penFinale.schietBeurt=volgende;
  renderPenFinale();
}

function penRondeBeslissen(rondeIdx){
  const ronde=penFinale.rondes[rondeIdx];
  const scores=ronde.deelnemers.map(n=>({n,g:ronde.resultaten[n]?.goals.filter(x=>x===true).length||0})).sort((a,b)=>b.g-a.g);
  const doorgangN=Math.max(1,Math.ceil(ronde.deelnemers.length/2));
  const grens=scores[doorgangN-1]?.g;
  ronde.doorgang=scores.filter((s,i)=>s.g>grens||(i<doorgangN)).map(s=>s.n);

  if(penFinale.rondes[rondeIdx+1]){
    const volgende=penFinale.rondes[rondeIdx+1];
    volgende.deelnemers=[...ronde.doorgang];
    const res={};
    ronde.doorgang.forEach(n=>{res[n]={goals:[]};});
    volgende.resultaten=res;
    volgende.doorgang=null;
  }
  penFinale.actieveRonde=null;
  showToast(`✓ ${ronde.naam} afgesloten — ${ronde.doorgang.length} door naar volgende ronde!`);
  renderPenFinale();
}

