function getTeamTotals(){
  return TEAMS.map((t,i)=>{let pts=0;GAME_HISTORY.forEach(g=>{if(g.klassement==='Teamklassement')pts+=g.scores[i];});return{...t,pts};}).sort((a,b)=>b.pts-a.pts);
}
