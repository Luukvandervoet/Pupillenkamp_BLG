<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pupillenkamp 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #2563EB;
  --accent-light: #EFF6FF;
  --accent-mid: #BFDBFE;
  --bg: #F8FAFC;
  --bg2: #FFFFFF;
  --bg3: #F1F5F9;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --border-dark: #CBD5E1;
  --text: #0F172A;
  --muted: #64748B;
  --muted-light: #94A3B8;
  --gold: #D97706;
  --gold-bg: #FEF3C7;
  --silver: #64748B;
  --silver-bg: #F1F5F9;
  --bronze: #92400E;
  --red: #DC2626;
  --red-bg: #FEF2F2;
  --green: #059669;
  --green-bg: #ECFDF5;
  --yellow: #D97706;
  --yellow-bg: #FFFBEB;
  --orange: #EA580C;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 12px rgba(0,0,0,0.07),0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.1),0 4px 8px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--accent);}
.logo span{color:var(--text);}
.day-badge{background:var(--accent);color:#fff;font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:20px;}

.nav-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.nav-wrap::-webkit-scrollbar{display:none;}
nav{max-width:960px;margin:0 auto;display:flex;gap:2px;padding:8px 16px;}
.nav-btn{font-size:0.8rem;font-weight:600;padding:7px 14px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.nav-btn:hover{background:var(--bg3);color:var(--text);}
.nav-btn.active{background:var(--accent-light);color:var(--accent);font-weight:700;}

main{max-width:960px;margin:0 auto;padding:20px 20px 80px;}
.section{display:none;}
.section.active{display:block;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.page-title{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;color:var(--text);margin-bottom:2px;}
.page-sub{font-size:0.83rem;color:var(--muted);margin-bottom:18px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
.card-title{font-size:0.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:600px){.grid-2{grid-template-columns:1fr}.grid-4{grid-template-columns:repeat(2,1fr)}}

.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.stat-card .num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--accent);line-height:1;}
.stat-card .lbl{font-size:0.7rem;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:3px;}

.lb-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;margin-bottom:3px;border:1px solid transparent;transition:all .12s;}
.lb-row:hover{background:var(--bg3);}
.lb-row.rank-1{background:var(--gold-bg);border-color:#FDE68A;}
.lb-row.rank-2{background:var(--silver-bg);border-color:var(--border-dark);}
.lb-row.rank-3{background:#FFF7ED;border-color:#FED7AA;}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;width:24px;text-align:center;color:var(--muted-light);flex-shrink:0;}
.rank-1 .rank-num{color:var(--gold)}.rank-2 .rank-num{color:var(--silver)}.rank-3 .rank-num{color:var(--bronze);}
.rank-medal{font-size:1rem;width:20px;flex-shrink:0;}
.rank-name{flex:1;font-weight:600;font-size:.9rem;}
.rank-pts{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:600;color:var(--accent);}
.rank-bar-wrap{width:70px;height:4px;background:var(--border);border-radius:2px;}
.rank-bar{height:4px;border-radius:2px;background:var(--accent);}

.btn{font-size:.82rem;font-weight:700;padding:9px 18px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.btn-primary:hover{background:#1D4ED8;transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--border-dark);color:var(--muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

.alert{padding:10px 14px;border-radius:7px;font-size:.85rem;font-weight:500;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;}
.alert-info{background:var(--accent-light);border:1px solid var(--accent-mid);color:var(--accent);}
.alert-warning{background:var(--yellow-bg);border:1px solid #FDE68A;color:var(--yellow);}
.alert-success{background:var(--green-bg);border:1px solid #A7F3D0;color:var(--green);}

.day-header{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:var(--accent);margin:20px 0 8px;padding-bottom:6px;border-bottom:2px solid var(--accent-mid);display:flex;align-items:center;gap:8px;}
.activity-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:7px;margin-bottom:4px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid transparent;transition:all .15s;}
.activity-row.clickable{cursor:pointer;}
.activity-row.clickable:hover{border-color:var(--accent);background:var(--accent-light);transform:translateX(2px);}
.activity-row.clickable:hover .activity-name{color:var(--accent);}
.activity-row.type-spel{border-left-color:var(--accent);}
.activity-row.type-maaltijd{border-left-color:var(--orange);}
.activity-row.type-vrij{border-left-color:var(--muted-light);}
.activity-time{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--muted);width:44px;flex-shrink:0;}
.activity-name{flex:1;font-weight:600;font-size:.88rem;}
.activity-tag{font-size:.67rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;}
.tag-Teamklassement{background:#EFF6FF;color:#2563EB;}
.tag-Vierkamp{background:#F5F3FF;color:#7C3AED;}
.tag-Penalty{background:#FDF4FF;color:#A21CAF;}
.tag-Individueel{background:#ECFDF5;color:#059669;}
.tag-8Kamp,.tag-8kamp{background:#FFF1F2;color:#E11D48;}
.tag-maaltijd{background:#FFF7ED;color:#EA580C;}
.tag-vrij{background:var(--bg3);color:var(--muted);}
.score-done{font-size:.75rem;color:var(--green);font-weight:700;white-space:nowrap;}
.score-open{font-size:.75rem;color:var(--yellow);font-weight:600;white-space:nowrap;}

.team-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm);}
.team-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:var(--accent-mid);}
.team-card .t-name{font-weight:800;font-size:.95rem;margin-bottom:4px;}
.team-card .t-leader{font-size:.77rem;color:var(--muted);}
.team-card .t-pts{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);margin:8px 0 4px;}
.player-list{list-style:none;margin-top:8px;}
.player-list li{display:flex;gap:8px;align-items:center;font-size:.83rem;padding:4px 0;border-bottom:1px solid var(--border);}
.player-list li:last-child{border-bottom:none;}
.p-num{font-family:'DM Mono',monospace;color:var(--accent);font-size:.82rem;width:18px;}

/* GAME HISTORY TABLE */
.gh-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
.gh-table{width:100%;border-collapse:collapse;font-size:.82rem;background:var(--bg2);}
.gh-table th{text-align:left;padding:9px 10px;font-size:.67rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border);background:var(--bg3);white-space:nowrap;}
.gh-table th.pts-th{text-align:center;}
.gh-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.gh-table tr:last-child td{border-bottom:none;}
.gh-table tr:hover td{background:var(--bg3);}
.gh-table tr.total-row td{background:var(--bg3);font-weight:800;border-top:2px solid var(--border-dark);}
.pts-cell{text-align:center;font-family:'DM Mono',monospace;font-weight:600;color:var(--accent);}
.rank-pill{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:.68rem;font-weight:800;margin-right:4px;}
.rank-pill.r1{background:var(--gold-bg);color:var(--gold);}
.rank-pill.r2{background:var(--silver-bg);color:var(--silver);}
.rank-pill.r3{background:#FFF7ED;color:var(--bronze);}
.rank-pill.rx{background:var(--bg3);color:var(--muted-light);}

.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);transform:translateY(16px);transition:transform .2s;max-height:90vh;overflow-y:auto;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;margin-bottom:4px;}
.modal-sub{font-size:.8rem;color:var(--muted);margin-bottom:16px;}
.modal-footer{margin-top:20px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}

.tab-row{display:flex;gap:4px;margin-bottom:16px;background:var(--bg3);padding:4px;border-radius:8px;width:fit-content;}
.tab{font-size:.78rem;font-weight:700;padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.tab.active{background:var(--bg2);color:var(--accent);box-shadow:var(--shadow-sm);}

.pen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:8px;}
.pen-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:7px;box-shadow:var(--shadow-sm);}
.pen-name{font-weight:700;font-size:.85rem;}
.pen-team{font-size:.7rem;}
.pen-score{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);}
.pen-btns{display:flex;gap:4px;}
.pen-btn{flex:1;padding:6px 0;border-radius:5px;border:1px solid var(--border);cursor:pointer;font-size:.75rem;font-weight:700;transition:all .1s;background:var(--bg3);color:var(--muted);}
.pen-btn.goal{background:var(--green-bg);border-color:#A7F3D0;color:var(--green);}
.pen-btn:active{transform:scale(.94);}

.duel-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow-sm);}
.duel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.duel-teams{font-weight:800;font-size:.92rem;}
.vs{color:var(--muted);margin:0 6px;font-weight:400;}
.duel-score{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--accent);}
.game-row{display:flex;align-items:center;gap:8px;font-size:.83rem;padding:5px 0;border-bottom:1px solid var(--border);}
.game-row:last-child{border-bottom:none;}
.game-name{flex:1;color:var(--muted);}
.game-result{font-weight:700;font-size:.78rem;padding:2px 8px;border-radius:20px;}
.w1{background:var(--green-bg);color:var(--green);}
.w2{background:var(--red-bg);color:var(--red);}
.draw{background:var(--bg3);color:var(--muted);}

.hero{background:linear-gradient(135deg,var(--accent) 0%,#1D4ED8 100%);border-radius:12px;padding:24px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden;}
.hero::after{content:'⚽';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:5rem;opacity:.12;}
.hero-day{font-size:.75rem;font-weight:700;letter-spacing:1px;opacity:.75;margin-bottom:4px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;line-height:1;}
.hero-sub{font-size:.82rem;opacity:.7;margin-top:6px;}

.score-input-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.score-input-row:last-child{border-bottom:none;}
.sir-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sir-name{flex:1;font-weight:600;font-size:.88rem;}
.sir-input{width:70px;padding:7px 10px;background:var(--bg);border:1px solid var(--border-dark);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.88rem;text-align:center;}
.sir-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;font-size:.88rem;font-weight:600;padding:12px 22px;border-radius:8px;z-index:999;box-shadow:var(--shadow-lg);transition:transform .3s;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* 8-KAMP */
.ak-subgame{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);}
.ak-subgame-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ak-subgame-num{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);width:28px;flex-shrink:0;line-height:1;}
.ak-subgame-name{flex:1;}
.ak-subgame-name input{width:100%;padding:7px 10px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text);}
.ak-subgame-name input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.ak-done-badge{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid #A7F3D0;}
.ak-open-badge{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--yellow-bg);color:var(--yellow);border:1px solid #FDE68A;}
.ak-team-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.ak-team-row:last-child{border-bottom:none;}
.ak-team-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ak-team-name{flex:1;font-size:.85rem;font-weight:600;}
.ak-score-input{width:70px;padding:6px 10px;background:var(--bg);border:1px solid var(--border-dark);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;text-align:center;}
.ak-score-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.ak-pts-preview{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:700;color:var(--accent);width:32px;text-align:right;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Pupillen<span>kamp</span> '26</div>
    <div class="day-badge">Dag 1 — Zondag</div>
  </div>
</header>
<div class="nav-wrap">
  <nav>
    <button class="nav-btn active" onclick="showSection('dashboard',this)">&#127968; Dashboard</button>
    <button class="nav-btn" onclick="showSection('teamklassement',this)">&#127942; Teamklassement</button>
    <button class="nav-btn" onclick="showSection('vierkamp',this)">&#9876;&#65039; Vierkamp</button>
    <button class="nav-btn" onclick="showSection('penalty',this)">&#9917; Penalty Bokaal</button>
    <button class="nav-btn" onclick="showSection('individueel',this)">&#127939; Individueel</button>
    <button class="nav-btn" onclick="showSection('preontbijt',this)">&#9728;&#65039; Pre-ontbijt</button>
    <button class="nav-btn" onclick="showSection('teams',this)">&#128085; Teams</button>
    <button class="nav-btn" onclick="showSection('achtkamp',this)">&#127919; 8-Kamp</button>
    <button class="nav-btn" onclick="showSection('planning',this)">&#128197; Planning</button>
  </nav>
</div>

<main>

<!-- DASHBOARD -->
<div class="section active" id="section-dashboard">
  <div class="hero">
    <div class="hero-day">PUPILLENKAMP 2026 — WEEK 1</div>
    <div class="hero-title">Goedemiddag,<br>Groepsleiders!</div>
    <div class="hero-sub">Zorg dat alle scores van vandaag zijn ingevoerd ✅</div>
  </div>
  <div class="grid-4" style="margin-bottom:16px">
    <div class="stat-card"><div class="num">8</div><div class="lbl">Teams</div></div>
    <div class="stat-card"><div class="num">62</div><div class="lbl">Spelers</div></div>
    <div class="stat-card"><div class="num" id="dash-spellen">4</div><div class="lbl">Spellen</div></div>
    <div class="stat-card"><div class="num" style="color:var(--yellow)" id="dash-open">2</div><div class="lbl">Open</div></div>
  </div>
  <div class="card"><div class="card-title">🏆 Teamklassement — Top 3</div><div id="dash-team-top3"></div></div>
  <div class="grid-2">
    <div class="card"><div class="card-title">⚽ Penalty Bokaal — Top 3</div><div id="dash-pen-top3"></div></div>
    <div class="card"><div class="card-title">🏃 Individueel — Top 3</div><div id="dash-ind-top3"></div></div>
  </div>
  <div class="card"><div class="card-title">📅 Vandaag op het programma</div><div id="dash-today"></div></div>
</div>

<!-- TEAMKLASSEMENT -->
<div class="section" id="section-teamklassement">
  <div class="page-title">Teamklassement</div>
  <div class="page-sub">Totaalstand op basis van alle ingevoerde spellen</div>
  <div class="tab-row">
    <button class="tab active" onclick="setTab('tk','stand',this)">Stand</button>
    <button class="tab" onclick="setTab('tk','historie',this)">Spelhistorie</button>
  </div>
  <div id="tk-stand"></div>
  <div id="tk-historie" style="display:none"></div>
</div>

<!-- VIERKAMP -->
<div class="section" id="section-vierkamp">
  <div class="page-title">Vierkamp</div>
  <div class="page-sub">4 vaste spellen per ronde — 2 teams per duel</div>
  <div class="tab-row">
    <button class="tab active" onclick="setTab('vk','stand',this)">Stand</button>
    <button class="tab" onclick="setTab('vk','duels',this)">Duels</button>
  </div>
  <div id="vk-stand"></div>
  <div id="vk-duels" style="display:none"></div>
</div>

<!-- PENALTY -->
<div class="section" id="section-penalty">
  <div class="page-title">Penalty Bokaal</div>
  <div class="page-sub">Elke dag 2 penalty's per speler op 2 verschillende keepers</div>
  <div class="tab-row">
    <button class="tab active" onclick="setTab('pen','setup',this)">⚙️ Instellen</button>
    <button class="tab" onclick="setTab('pen','invoer',this)">📝 Invoer</button>
    <button class="tab" onclick="setTab('pen','spelers',this)">🏅 Spelers</button>
    <button class="tab" onclick="setTab('pen','keepers',this)">🧤 Keepers</button>
    <button class="tab" onclick="setTab('pen','historie',this)">📅 Per dag</button>
    <button class="tab" onclick="setTab('pen','finale',this)">🏆 Finale</button>
  </div>
  <div id="pen-setup"></div>
  <div id="pen-invoer" style="display:none"></div>
  <div id="pen-spelers" style="display:none"></div>
  <div id="pen-keepers" style="display:none"></div>
  <div id="pen-historie" style="display:none"></div>
  <div id="pen-finale" style="display:none"></div>
</div>

<!-- INDIVIDUEEL -->
<div class="section" id="section-individueel">
  <div class="page-title">Individueel Klassement</div>
  <div class="page-sub">Dagelijkse spellen in vaste groepen — op leeftijd &amp; niveau</div>
  <div class="tab-row">
    <button class="tab active" onclick="setTab('ind','stand',this)">&#127941; Stand</button>
    <button class="tab" onclick="setTab('ind','invoer',this)">&#128221; Invoer</button>
