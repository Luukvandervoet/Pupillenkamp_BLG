function preOpslaanWedstrijd(di,wi) {
  preSchema[di].wedstrijden[wi].opgeslagen=true;
  // Verwerk score naar GAME_HISTORY als teamklassement
  const w=preSchema[di].wedstrijden[wi];
  if(w.scores && w.team1 && w.team2) {
    const t1idx=TEAMS.findIndex(t=>t.name===w.team1), t2idx=TEAMS.findIndex(t=>t.name===w.team2);
    if(t1idx>=0&&t2idx>=0){
      const scores=Array(8).fill(0);
      const [p1,p2]=w.scores;
      scores[t1idx]=p1>p2?8:p1===p2?4:1;
      scores[t2idx]=p2>p1?8:p1===p2?4:1;
      GAME_HISTORY.push({name:`Pre-ontbijt ${PRE_DAGEN[di]} - ${w.naam}`, klassement:'Teamklassement', type:'raw', date:PRE_DAGEN[di], time:'07:30', scores, rawScores:w.scores});
    }
  }
  showToast('&#10003; Score opgeslagen!');
  renderPreOntbijt(); renderTeamKlassement();
}
