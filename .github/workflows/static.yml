function setTab(prefix,tab,btn){
  const section=document.getElementById('section-'+{tk:'teamklassement',vk:'vierkamp',pen:'penalty',ak:'achtkamp'}[prefix]);
  section.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  // hide all sub-panels
  ['stand','historie','duels','invoer','detail','spelers','keepers','setup','finale','groepen','spellen','schema'].forEach(p=>{const el=document.getElementById(prefix+'-'+p);if(el)el.style.display='none';});
  const target=document.getElementById(prefix+'-'+tab);
  if(target)target.style.display='block';
  // re-render
  ({tk:renderTeamKlassement,vk:renderVierkamp,pen:renderPenalty,ak:renderAchtkamp})[prefix]?.();
}

