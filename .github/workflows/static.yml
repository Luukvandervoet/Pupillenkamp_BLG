function renderTeamKlassement(){
  // STAND
  const totals=getTeamTotals(),max=totals[0].pts||1;
  document.getElementById('tk-stand').innerHTML=totals.map((t,i)=>`
    <div class="lb-row rank-${i<3?i+1:99}">
      <div class="rank-num">${i+1}</div><div class="rank-medal">${i<3?medals[i]:''}</div>
      <div class="rank-name"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${t.color};margin-right:7px"></span>${t.name}
        <span style="color:var(--muted-light);font-size:.75rem;font-weight:400;margin-left:4px">${t.leader}</span></div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(t.pts/max*100)}%;background:${t.color}"></div></div>
      <div class="rank-pts">${t.pts}pt</div></div>`).join('');

  // HISTORIE
  const games=GAME_HISTORY.filter(g=>g.klassement==='Teamklassement');
  if(!games.length){
    document.getElementById('tk-historie').innerHTML=`<div class="alert alert-info">ℹ️ Nog geen spellen ingevoerd.</div><button class="btn btn-primary" onclick="openScoreModal(null,null,'Teamklassement')">+ Eerste spel invoeren</button>`;
    return;
  }
  let html=`<div class="gh-wrap"><table class="gh-table"><thead><tr>
    <th>Spel</th><th>Dag</th><th>Tijd</th>`;
  TEAMS.forEach(t=>{html+=`<th class="pts-th"><span style="color:${t.color}">●</span> ${t.name.split(' ')[0]}</th>`;});
  html+=`</tr></thead><tbody>`;
  games.forEach(g=>{
    html+=`<tr><td><strong>${g.name}</strong></td><td style="color:var(--muted);font-size:.82rem">${g.date}</td><td style="font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted)">${g.time}</td>`;
    g.scores.forEach((pts,i)=>{
      const rank=g.scores.filter(x=>x>pts).length+1;
      const cls=rank===1?'r1':rank===2?'r2':rank===3?'r3':'rx';
      const rawLabel = g.rawScores ? `<span style="color:var(--muted-light);font-size:.72rem;display:block">${g.rawScores[i]} pnt</span>` : '';
      html+=`<td class="pts-cell"><span class="rank-pill ${cls}">${rank}</span>${pts}kp${rawLabel}</td>`;
    });
    html+=`</tr>`;
  });
  // Totaalrij
  html+=`<tr class="total-row"><td colspan="3">Totaal</td>`;
  TEAMS.forEach((t,i)=>{html+=`<td class="pts-cell">${games.reduce((s,g)=>s+g.scores[i],0)}pt</td>`;});
  html+=`</tr></tbody></table></div>`;
  html+=`<div style="margin-top:12px"><button class="btn btn-primary" onclick="openScoreModal(null,null,'Teamklassement')">+ Nieuw spel invoeren</button></div>`;
  document.getElementById('tk-historie').innerHTML=html;
}

// ── VIERKAMP ─────────────────────────────────────────────────
function renderVierkamp(){
  const vkTotals=TEAMS.map(t=>{let w=0;VK_DUELS.forEach(d=>{if(d.team1===t.name||d.team2===t.name)d.games.forEach(g=>{const isT1=d.team1===t.name;if((g.w===1&&isT1)||(g.w===2&&!isT1))w++;});});return{...t,vkW:w};}).sort((a,b)=>b.vkW-a.vkW);
  document.getElementById('vk-stand').innerHTML=vkTotals.map((t,i)=>`
    <div class="lb-row rank-${i<3?i+1:99}"><div class="rank-num">${i+1}</div><div class="rank-medal">${i<3?medals[i]:''}</div>
    <div class="rank-name"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${t.color};margin-right:7px"></span>${t.name}</div>
    <div class="rank-pts">${t.vkW} <span style="font-size:.72rem;color:var(--muted)">gewonnen</span></div></div>`).join('');
  document.getElementById('vk-duels').innerHTML=VK_DUELS.map(d=>{
    const t1w=d.games.filter(g=>g.w===1).length,t2w=d.games.filter(g=>g.w===2).length;
    const c1=TEAMS.find(t=>t.name===d.team1)?.color,c2=TEAMS.find(t=>t.name===d.team2)?.color;
    return `<div class="duel-card">
      <div class="duel-header"><div class="duel-teams"><span style="color:${c1}">${d.team1}</span><span class="vs">vs</span><span style="color:${c2}">${d.team2}</span></div>
      <div class="duel-score">${t1w}–${t2w}</div></div>
      ${d.games.map(g=>`<div class="game-row"><div class="game-name">${g.name}</div>${g.w===1?`<span class="game-result w1">${d.team1}</span>`:g.w===2?`<span class="game-result w2">${d.team2}</span>`:`<span class="game-result draw">Gelijk</span>`}</div>`).join('')}
    </div>`;
  }).join('');
}

// ── RENDER PENALTY ────────────────────────────────────────────
function renderPenalty() {
  renderPenInvoer();
  renderPenSpelers();
  renderPenKeepers();
  renderPenHistorie();
}

// ── INACTIEF SPELERS ─────────────────────────────────────────
const inactiefSpelers = new Set();
function isActief(naam) { return !inactiefSpelers.has(naam); }
function setInactief(naam, val) {
  if(val) inactiefSpelers.add(naam); else inactiefSpelers.delete(naam);
  renderTeams(); renderPenSpelers(); renderIndStand();
}

// ── KAMPSTAF ─────────────────────────────────────────────────
// Groepsleiders + extra kampstaf. Vul hier de extra stafleden in:
const EXTRA_STAF = ['Kampleiding']; // ← pas aan naar echte namen, of beheer via Teams → Kampstaf
const KAMPSTAF = [...LEADERS, ...EXTRA_STAF]; // wordt dynamisch bijgehouden

// ── INDIVIDUEEL DATA ──────────────────────────────────────────
const IND_GROEPEN = [
  { id:1, naam:'Groep A', spelers:[] },
  { id:2, naam:'Groep B', spelers:[] },
  { id:3, naam:'Groep C', spelers:[] },
  { id:4, naam:'Groep D', spelers:[] },
];
const IND_DAGEN = ['Maandag','Dinsdag','Woensdag','Donderdag'];
const indSpellen = IND_DAGEN.map(dag => ({
  dag,
  spellen: Array.from({length:4}, () => ({ naam:'', maker:'', leider:'', uitleg:'', opgeslagen:false, scores:{} }))
}));
let indHuidigeDag = 0;

function indPuntenSpeler(naam) {
  if(!isActief(naam)) return 0;
  let pts = 0;
  indSpellen.forEach(dag => dag.spellen.forEach(spel => {
    if(!spel.opgeslagen) return;
    const groep = IND_GROEPEN.find(g => g.spelers.includes(naam));
    if(groep) pts += spel.scores[groep.id] || 0;
  }));
  return pts;
}

// ── INDIVIDUEEL ──────────────────────────────────────────────
function renderInd() {
  renderIndStand(); renderIndInvoer(); renderIndGroepen(); renderIndSpellen();
}

function renderIndStand() {
  const el = document.getElementById('ind-stand');
  if(!el) return;
  const sorted = PLAYERS_ALL.filter(p=>isActief(p.name)).map(p=>({...p, pts:indPuntenSpeler(p.name)})).sort((a,b)=>b.pts-a.pts);
  const max = sorted[0]?.pts || 1;
  let html = '';
  sorted.forEach(p => {
    const rang = sorted.filter(x=>x.pts>p.pts).length+1;
    const medal = rang===1?medals[0]:rang===2?medals[1]:rang===3?medals[2]:'';
    html += `<div class="lb-row rank-${rang<=3?rang:99}">
      <div class="rank-num">${rang}</div><div class="rank-medal">${medal}</div>
      <div class="rank-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:6px"></span>${p.name} <span style="color:var(--muted-light);font-size:.75rem">${p.team}</span></div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(p.pts/max*100)}%"></div></div>
      <div class="rank-pts">${p.pts}pt</div></div>`;
  });
  el.innerHTML = html || '<div class="alert alert-info">Nog geen scores ingevoerd.</div>';
}

function renderIndInvoer() {
  const el = document.getElementById('ind-invoer');
  if(!el) return;
  let html = `<div class="card" style="margin-bottom:12px"><div class="card-title">Dag selecteren</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;
  IND_DAGEN.forEach((dag,i) => {
    const n = indSpellen[i].spellen.filter(s=>s.opgeslagen).length;
    html += `<button class="btn ${i===indHuidigeDag?'btn-primary':'btn-outline'}" style="font-size:.78rem;padding:6px 12px" onclick="indSetDag(${i})">${dag}${n>0?` (${n}/4)`:''}</button>`;
  });
  html += `</div></div>`;

  indSpellen[indHuidigeDag].spellen.forEach((spel,si) => {
    const naam = spel.naam || `Spel ${si+1}`;
    html += `<div class="ak-subgame" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--accent)">${naam}</div>
        ${spel.maker?`<span style="font-size:.72rem;color:var(--muted)">maker: ${spel.maker}</span>`:''}
        ${spel.leider?`<span style="font-size:.72rem;color:var(--muted)"> · leider: ${spel.leider}</span>`:''}
        ${spel.opgeslagen?`<span style="font-size:.72rem;padding:2px 8px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:700">&#10003; opgeslagen</span>`:''}
      </div>
      ${spel.uitleg?`<div style="font-size:.8rem;color:var(--muted);background:var(--bg2);padding:7px 10px;border-radius:6px;margin-bottom:8px;border-left:3px solid var(--accent)">&#128218; ${spel.uitleg}</div>`:''}
      ${IND_GROEPEN.map(g => {
        if(g.spelers.filter(n=>isActief(n)).length===0) return '';
        const pts = spel.scores[g.id] ?? '';
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
          <span style="font-weight:600;font-size:.85rem;flex:1">${g.naam} <span style="font-size:.73rem;color:var(--muted-light)">${g.spelers.filter(n=>isActief(n)).length} sp.</span></span>
          ${!spel.opgeslagen
            ?`<input type="number" min="0" value="${pts}" placeholder="pts" style="width:70px;padding:6px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:6px;font-family:'DM Mono',monospace;font-size:.88rem;text-align:center" onchange="indSpellen[${indHuidigeDag}].spellen[${si}].scores[${g.id}]=parseInt(this.value)||0">`
            :`<span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--accent)">${pts!==''?pts+'pt':'—'}</span>`}
        </div>`;
      }).join('')}
      <div style="margin-top:10px">
        ${!spel.opgeslagen
          ?`<button class="btn btn-primary" style="font-size:.78rem" onclick="indOpslaanSpel(${indHuidigeDag},${si})">&#10003; Opslaan</button>`
          :`<button class="btn btn-outline" style="font-size:.72rem" onclick="indSpelHeropen(${indHuidigeDag},${si})">&#128275; Heropenen (admin)</button>`}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function indSetDag(i) { indHuidigeDag=i; renderIndInvoer(); }
function indOpslaanSpel(d,s) { indSpellen[d].spellen[s].opgeslagen=true; showToast('&#10003; Spel opgeslagen!'); renderInd(); }
function indSpelHeropen(d,s) { indSpellen[d].spellen[s].opgeslagen=false; renderIndInvoer(); }

function renderIndGroepen() {
  const el = document.getElementById('ind-groepen');
  if(!el) return;
  const inGroep = IND_GROEPEN.flatMap(g=>g.spelers);
  const vrij = PLAYERS_ALL.filter(p=>!inGroep.includes(p.name));
  let html = `<div class="alert alert-info" style="margin-bottom:12px">Vaste indeling op leeftijd &amp; niveau — onafhankelijk van teams. Groepsnamen zijn bewerkbaar.</div>`;
  IND_GROEPEN.forEach((g,gi) => {
    html += `<div class="ak-subgame" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input value="${g.naam}" style="font-weight:700;font-size:.95rem;background:transparent;border:none;border-bottom:2px solid var(--accent);padding:2px 4px;color:var(--text);flex:1;min-width:80px" onchange="IND_GROEPEN[${gi}].naam=this.value">
        <span style="font-size:.75rem;color:var(--muted)">${g.spelers.filter(n=>isActief(n)).length} actief</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;min-height:30px;padding:6px;background:var(--bg2);border-radius:6px;border:1px solid var(--border);margin-bottom:6px">
        ${g.spelers.map(naam=>{
          const p=PLAYERS_ALL.find(x=>x.name===naam); const inact=!isActief(naam);
          return `<span style="display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;background:${inact?'var(--bg3)':p?.color||'#999'};color:${inact?'var(--muted)':'white'};font-size:.78rem;font-weight:600;${inact?'opacity:.45':''}">
            ${naam}<button onclick="indVerwijderUitGroep(${gi},'${naam}')" style="background:none;border:none;color:inherit;cursor:pointer;line-height:1;padding:0 0 0 2px;opacity:.7">&#10005;</button></span>`;
        }).join('')}
        ${g.spelers.length===0?`<span style="font-size:.75rem;color:var(--muted-light);font-style:italic">Leeg</span>`:''}
      </div>
    </div>`;
  });
  if(vrij.length>0) {
    html += `<div class="card"><div class="card-title">Nog niet ingedeeld (${vrij.length})</div><div style="display:flex;flex-wrap:wrap;gap:6px">`;
    vrij.forEach(p => {
      html += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.82rem">
        <div style="font-weight:600;margin-bottom:4px"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${p.color};margin-right:4px"></span>${p.name} <span style="color:var(--muted-light);font-size:.7rem">${p.team}</span></div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${IND_GROEPEN.map((g,gi)=>`<button class="btn btn-outline" style="font-size:.68rem;padding:2px 8px" onclick="indVoegToeAanGroep(${gi},'${p.name}')">+${g.naam}</button>`).join('')}</div>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="alert alert-success">&#10003; Alle spelers zijn ingedeeld.</div>`;
  }
  el.innerHTML = html;
}

function indVoegToeAanGroep(gi,naam) { IND_GROEPEN.forEach(g=>{g.spelers=g.spelers.filter(n=>n!==naam);}); IND_GROEPEN[gi].spelers.push(naam); renderIndGroepen(); }
function indVerwijderUitGroep(gi,naam) { IND_GROEPEN[gi].spelers=IND_GROEPEN[gi].spelers.filter(n=>n!==naam); renderIndGroepen(); }

function renderIndSpellen() {
  const el = document.getElementById('ind-spellen');
  if(!el) return;
  let html = `<div class="alert alert-info" style="margin-bottom:12px">Stel per dag 4 spellen in. De <strong>maker</strong> is verantwoordelijk &amp; mag als enige het spel doorsturen (naast admin).</div>`;
  IND_DAGEN.forEach((dag,di) => {
    html += `<div class="day-header">&#128197; ${dag}</div>`;
    indSpellen[di].spellen.forEach((spel,si) => {
      html += `<div class="ak-subgame" style="margin-bottom:8px">
        <div style="font-size:.7rem;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:8px">SPEL ${si+1}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <div><label style="font-size:.68rem;font-weight:700;color:var(--muted);display:block;margin-bottom:3px">NAAM</label>
            <input value="${spel.naam}" placeholder="Bijv. Estafette" style="width:100%;padding:6px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.85rem;color:var(--text)" onchange="indSpellen[${di}].spellen[${si}].naam=this.value;renderIndInvoer()"></div>
          <div><label style="font-size:.68rem;font-weight:700;color:var(--muted);display:block;margin-bottom:3px">MAKER</label>
            <select style="width:100%;padding:6px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.82rem;color:var(--text)" onchange="indSpellen[${di}].spellen[${si}].maker=this.value">
              <option value="">Kies...</option>${KAMPSTAF.map(s=>`<option value="${s}" ${spel.maker===s?'selected':''}>${s}</option>`).join('')}</select></div>
          <div><label style="font-size:.68rem;font-weight:700;color:var(--muted);display:block;margin-bottom:3px">LEIDER (uitvoering)</label>
            <select style="width:100%;padding:6px 8px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.82rem;color:var(--text)" onchange="indSpellen[${di}].spellen[${si}].leider=this.value">
              <option value="">Kies...</option>${KAMPSTAF.map(s=>`<option value="${s}" ${spel.leider===s?'selected':''}>${s}</option>`).join('')}</select></div>
        </div>
        <div><label style="font-size:.68rem;font-weight:700;color:var(--muted);display:block;margin-bottom:3px">UITLEG (zichtbaar voor leider)</label>
          <textarea placeholder="Regels, benodigdheden, duur..." style="width:100%;padding:7px 9px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:5px;font-size:.82rem;color:var(--text);resize:vertical;min-height:52px" onchange="indSpellen[${di}].spellen[${si}].uitleg=this.value">${spel.uitleg}</textarea></div>
      </div>`;
    });
  });
  el.innerHTML = html;
}

// ── TEAMS ────────────────────────────────────────────────────
function renderTeams(){
  renderTeamsOverzicht();
  renderTeamsStaf();
}

function renderTeamsOverzicht(){
  const el = document.getElementById('teams-overzicht');
  if(!el) return;
  el.innerHTML = `<div class="grid-2">${TEAMS.map(t=>{
    const tot=getTeamTotals().find(x=>x.id===t.id);
    const nInact=t.players.filter(p=>!isActief(p.name)).length;
    return `<div class="team-card" onclick="showTeamModal(${t.id})">
      <div class="t-name" style="color:${t.color}">${t.name}</div>
      <div class="t-leader">&#128100; ${t.leader}</div>
      <div class="t-pts">${tot.pts}<span style="font-size:.9rem;color:var(--muted)"> pts</span></div>
      <ul class="player-list">${t.players.map(p=>{const inact=!isActief(p.name);return `<li style="${inact?'opacity:.4;text-decoration:line-through':''}"><span class="p-num">${p.num}</span>${p.name}</li>`;}).join('')}</ul>
      ${nInact?`<div style="font-size:.72rem;color:var(--red);margin-top:4px">&#128564; ${nInact} inactief</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function renderTeamsStaf(){
  const el = document.getElementById('teams-staf');
  if(!el) return;

  let html = `<div class="alert alert-info" style="margin-bottom:12px">
    De kampstaf bestaat uit alle groepsleiders + extra stafleden. Extra stafleden kunnen makers of leiders zijn van spellen.
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-title">Groepsleiders (automatisch)</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">`;
  LEADERS.forEach((l,i) => {
    const t = TEAMS[i];
    html += `<div style="display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:.83rem">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.color}"></span>
      <span style="font-weight:600">${l}</span>
      <span style="color:var(--muted-light);font-size:.75rem">${t.name}</span>
    </div>`;
  });
  html += `</div></div>

  <div class="card">
    <div class="card-title">Extra kampstaf</div>
    <div style="margin-bottom:10px" id="extra-staf-lijst">`;

  EXTRA_STAF.forEach((naam, i) => {
    html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="flex:1;font-weight:600;font-size:.88rem">&#128100; ${naam}</span>
      <button onclick="stafVerwijder(${i})" style="padding:4px 10px;border-radius:5px;border:1px solid var(--border-dark);background:transparent;font-size:.75rem;color:var(--red);cursor:pointer">Verwijder</button>
    </div>`;
  });

  if(EXTRA_STAF.length === 0) {
    html += `<div style="font-size:.83rem;color:var(--muted);font-style:italic;padding:6px 0">Nog geen extra stafleden toegevoegd.</div>`;
  }

  html += `</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="nieuw-staf-naam" placeholder="Naam nieuw staflid..." style="flex:1;min-width:160px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border-dark);border-radius:6px;font-size:.88rem;color:var(--text)">
      <button class="btn btn-primary" onclick="stafToevoegen()" style="font-size:.82rem">&#43; Toevoegen</button>
    </div>
  </div>`;

  el.innerHTML = html;
}

function stafToevoegen() {
  const input = document.getElementById('nieuw-staf-naam');
  const naam = input?.value?.trim();
  if(!naam) return;
  EXTRA_STAF.push(naam);
  // Sync naar KAMPSTAF array
  KAMPSTAF.length = 0;
  LEADERS.forEach(l => KAMPSTAF.push(l));
  EXTRA_STAF.forEach(l => KAMPSTAF.push(l));
  input.value = '';
  showToast(`&#10003; ${naam} toegevoegd aan kampstaf`);
  renderTeamsStaf();
}

function stafVerwijder(idx) {
  EXTRA_STAF.splice(idx, 1);
  KAMPSTAF.length = 0;
  LEADERS.forEach(l => KAMPSTAF.push(l));
  EXTRA_STAF.forEach(l => KAMPSTAF.push(l));
  renderTeamsStaf();
}

function showTeamModal(id){
  const t=TEAMS.find(x=>x.id===id),tot=getTeamTotals().find(x=>x.id===id);
  document.getElementById('modal-title').textContent=t.name;
  document.getElementById('modal-sub').textContent=`Groepsleider: ${t.leader} · ${tot.pts} punten totaal`;
  document.getElementById('modal-body').innerHTML=`<div style="font-size:.72rem;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:8px">SPELERS — klik om inactief te zetten</div>
    ${t.players.map(p=>{const inact=!isActief(p.name);return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
      <span class="p-num">${p.num}</span>
      <span style="flex:1;font-weight:600;font-size:.88rem;${inact?'opacity:.4;text-decoration:line-through':''}">${p.name}</span>
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:.78rem">
        <input type="checkbox" ${inact?'checked':''} onchange="setInactief('${p.name}',this.checked)" style="accent-color:#EF4444;width:15px;height:15px">
        <span style="color:${inact?'var(--red)':'var(--muted)'}">Inactief</span>
      </label>
    </div>`; }).join('')}`;
  document.getElementById('modal-footer').innerHTML=`<button class="btn btn-outline" onclick="closeModal()">Sluiten</button>`;
  openModal();
}

// ── PLANNING ─────────────────────────────────────────────────
function renderPlanning(){
  document.getElementById('planning-content').innerHTML=PLANNING.map(day=>`
    <div class="day-header">${day.icon} ${day.day}</div>
    ${day.acts.map(a=>{
      const kl=a.klassement,isClickable=!!kl;
      const is8kamp = kl==='8-Kamp';
      const tagCls=kl?`tag-${kl.replace(/ /g,'').replace('-','')}`:`tag-${a.type}`;
      const tagLabel=kl||a.type;

      // Status bepalen
      let done=false;
      if(is8kamp) done = ACHTKAMP.verwerkt;
      else if(kl==='Teamklassement') done = !!GAME_HISTORY.find(g=>g.name===a.name);

      // Voortgang 8-kamp: hoeveel subspellen ingevuld
      let progressTag='';
      if(is8kamp && !done){
        const ingevuld = ACHTKAMP.subspellen.filter(sp=>sp.scores.every(s=>s!==null)).length;
        progressTag = ingevuld>0
          ? `<span class="score-open">${ingevuld}/8 spellen</span>`
          : `<span class="score-open">→ invoeren</span>`;
      }

      const statusTag = done
        ? `<span class="score-done">✓ ingevoerd</span>`
        : isClickable && !is8kamp
          ? `<span class="score-open">→ invoeren</span>`
          : progressTag;

      // Klik: 8-kamp → ga naar 8-kamp sectie; andere spellen → score modal
      let click='';
      if(is8kamp){
        click=`onclick="openAkVanuitPlanning('${a.name.replace(/'/g,"\\'")}','${a.time}')"`;
      } else if(isClickable){
        click=`onclick="openScoreModal('${a.name.replace(/'/g,"\\'")}','${a.time}','${kl}')"`;
      }

      return `<div class="activity-row type-${a.type}${isClickable?' clickable':''}" ${click}>
        <div class="activity-time">${a.time}</div>
        <div class="activity-name">${a.name}</div>
        <span class="activity-tag ${tagCls}">${tagLabel}</span>
        ${statusTag}
      </div>`;
    }).join('')}`).join('');
}

// ── SCORE BEREKENING ─────────────────────────────────────────
// Gedeelde positie: als 2 teams gelijk staan op plek 1, krijgen beiden 8pt.
// De volgende plek is dan 3 (niet 2). Gedeelde punten worden gemiddeld:
// plek 1+2 gedeeld → (8+7)/2 = 7.5 → afgerond naar boven = 8 voor beiden (simpel: max van de gedeelde plekken)
// Wij gebruiken: elk team krijgt de punten behorend bij zijn BESTE gedeelde plek.
// (Dus gedeelde 1e = 8pt, gedeelde 2e/3e = 7pt, gedeelde 5e/6e = 4pt, etc.)
function rawScoresToKlassementPunten(rawScores) {
  // rawScores: array van getallen, index = team index (zelfde volgorde als TEAMS)
  const n = rawScores.length; // 8
  const klassementPts = new Array(n).fill(0);
  // Sorteer unieke scores aflopend
  for (let i = 0; i < n; i++) {
    // Rang = aantal teams met een hogere score + 1
    const rang = rawScores.filter(s => s > rawScores[i]).length + 1;
    // Punten voor rang: rang 1 = 8, rang 2 = 7, ..., rang 8 = 1
    klassementPts[i] = Math.max(1, n - rang + 1);
  }
  return klassementPts;
}

// Preview tabel: toon live de berekende stand terwijl je invoert
function updateScorePreview() {
  const rawScores = TEAMS.map(t => {
    const v = parseFloat(document.getElementById('sir-'+t.id)?.value);
    return isNaN(v) ? null : v;
  });
  const allFilled = rawScores.every(v => v !== null);
  const preview = document.getElementById('score-preview');
  if (!preview) return;
  if (!allFilled) { preview.innerHTML = ''; return; }

  const kPts = rawScoresToKlassementPunten(rawScores);
  // Bouw gesorteerde preview
  const rows = TEAMS.map((t,i) => ({
    name: t.name, color: t.color,
    raw: rawScores[i], kPts: kPts[i],
    rang: rawScores.filter(s => s > rawScores[i]).length + 1
  })).sort((a,b) => b.raw - a.raw || a.name.localeCompare(b.name));

  let html = `<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
    <div style="font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Live preview stand</div>`;
  rows.forEach(r => {
    const medal = r.rang===1?'🥇':r.rang===2?'🥈':r.rang===3?'🥉':'';
    html += `<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.85rem">
      <span style="width:22px;text-align:center;font-size:.9rem">${medal||r.rang}</span>
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${r.color};flex-shrink:0"></span>
      <span style="flex:1;font-weight:600">${r.name}</span>
      <span style="color:var(--muted);font-size:.8rem;font-family:'DM Mono',monospace">${r.raw} punten</span>
      <span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--accent);min-width:36px;text-align:right">${r.kPts}pt</span>
    </div>`;
  });
  html += `</div>`;
  preview.innerHTML = html;
}

// ── SCORE MODAL ──────────────────────────────────────────────
function openScoreModal(spelNaam,tijd,klassement){
  document.getElementById('modal-title').textContent=spelNaam||'Score invoeren';
  document.getElementById('modal-sub').textContent=(tijd?tijd+' · ':'')+klassement;
  if(klassement==='Teamklassement'){
    let body=`<div class="alert alert-info" style="margin-bottom:12px">
      Vul de behaalde <strong>punten per team</strong> in. Gelijke scores → gedeelde positie → zelfde klassementspunten.<br>
      <span style="font-size:.78rem;opacity:.8">1e = 8kp · 2e = 7kp · … · 8e = 1kp (gedeeld = hoogste plek telt)</span>
    </div>`;
    TEAMS.forEach(t=>{
      body+=`<div class="score-input-row">
        <div class="sir-dot" style="background:${t.color}"></div>
        <div class="sir-name">${t.name}</div>
        <input class="sir-input" type="number" min="0" step="0.5" placeholder="bijv. 15" id="sir-${t.id}" oninput="updateScorePreview()">
      </div>`;
    });
    body+=`<div id="score-preview"></div>`;
    document.getElementById('modal-body').innerHTML=body;
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-outline" onclick="closeModal()">Annuleren</button><button class="btn btn-primary" onclick="saveScoreModal('${(spelNaam||'').replace(/'/g,"\\'")}','${tijd||''}','Teamklassement')">✓ Opslaan</button>`;
  }else if(klassement==='Penalty'){
    document.getElementById('modal-body').innerHTML=`<p style="color:var(--muted);font-size:.88rem">Ga naar het <strong>Penalty Bokaal</strong> tabblad om scores in te voeren per speler.</p>`;
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-outline" onclick="closeModal()">Sluiten</button><button class="btn btn-primary" onclick="closeModal();showSection('penalty',document.querySelectorAll('.nav-btn')[3])">Naar Penalty Bokaal →</button>`;
  }else{
    document.getElementById('modal-body').innerHTML=`<p style="color:var(--muted);font-size:.88rem">Score invoer voor <strong>${klassement}</strong> — gebruik het bijbehorende klassementscherm.</p>`;
    document.getElementById('modal-footer').innerHTML=`<button class="btn btn-outline" onclick="closeModal()">Sluiten</button>`;
  }
  openModal();
}

function saveScoreModal(spelNaam,tijd,klassement){
  const rawScores=[];let valid=true;
  TEAMS.forEach(t=>{
    const v=parseFloat(document.getElementById('sir-'+t.id)?.value);
    if(isNaN(v)){valid=false;return;}
    rawScores.push(v);
  });
  if(!valid||rawScores.length!==8){showToast('⚠️ Vul voor alle 8 teams een score in');return;}
  const kPts = rawScoresToKlassementPunten(rawScores);
  const name=spelNaam||`Spel ${GAME_HISTORY.length+1}`;
  GAME_HISTORY.push({name,klassement,type:'raw',date:'—',time:tijd||'—',scores:kPts,rawScores});
  closeModal();
  showToast(`✓ "${name}" opgeslagen!`);
  renderTeamKlassement();
  renderPlanning();
  document.getElementById('dash-spellen').textContent=GAME_HISTORY.length;
}

// ── 8-KAMP DATA ──────────────────────────────────────────────
// 8 sub-spellen, per spel een raw score per team
// scores: array van 8 waarden (index = team index), null = niet ingevoerd
const ACHTKAMP = {
  naam: '8-Kamp',
  verwerkt: false, // true als eindstand al naar teamklassement is gestuurd
  subspellen: [
    {naam:'Spel 1', scores: Array(8).fill(null)},
    {naam:'Spel 2', scores: Array(8).fill(null)},
    {naam:'Spel 3', scores: Array(8).fill(null)},
    {naam:'Spel 4', scores: Array(8).fill(null)},
    {naam:'Spel 5', scores: Array(8).fill(null)},
    {naam:'Spel 6', scores: Array(8).fill(null)},
    {naam:'Spel 7', scores: Array(8).fill(null)},
    {naam:'Spel 8', scores: Array(8).fill(null)},
  ]
};

// Bereken per subspel de klassementspunten (1e=8, 2e=7, ... gedeeld = max van gedeelde plekken)
function akSubPunten(rawScores) {
  return rawScores.map(s => {
    if(s === null) return null;
    const rang = rawScores.filter(x => x !== null && x > s).length + 1;
    return Math.max(1, 8 - rang + 1);
  });
}

// Totaalpunten per team over alle ingevulde subspellen
function akTotaalPunten() {
  return TEAMS.map((t, i) => {
    let total = 0;
    ACHTKAMP.subspellen.forEach(sp => {
      const kPts = akSubPunten(sp.scores);
      if(kPts[i] !== null) total += kPts[i];
    });
    return total;
  });
}

// ── RENDER 8-KAMP ─────────────────────────────────────────────
function renderAchtkamp() {
  renderAkInvoer();
  renderAkStand();
  renderAkDetail();
}

function renderAkInvoer() {
  const el = document.getElementById('ak-invoer');
  if(!el) return;

  let html = `<div class="alert alert-info" style="margin-bottom:14px">
    Vul per sub-spel de behaalde punten in per team. Klassementspunten (1e=8 t/m 8e=1) worden live berekend.
    Gedeelde scores → gedeelde positie.
  </div>`;

  ACHTKAMP.subspellen.forEach((sp, si) => {
    const filled = sp.scores.filter(s => s !== null).length;
    const isDone = filled === 8;
    const badge = isDone
      ? `<span class="ak-done-badge">✓ compleet</span>`
      : filled > 0
        ? `<span class="ak-open-badge">${filled}/8</span>`
        : `<span class="ak-open-badge">open</span>`;

    html += `<div class="ak-subgame">
      <div class="ak-subgame-header">
        <div class="ak-subgame-num">${si+1}</div>
        <div class="ak-subgame-name">
          <input type="text" value="${sp.naam}" placeholder="Naam sub-spel ${si+1}"
            onchange="ACHTKAMP.subspellen[${si}].naam=this.value;renderAkDetail()">
        </div>
        ${badge}
      </div>`;

    TEAMS.forEach((t, ti) => {
      const kPts = akSubPunten(sp.scores);
      const pts = kPts[ti];
      html += `<div class="ak-team-row">
        <div class="ak-team-dot" style="background:${t.color}"></div>
        <div class="ak-team-name">${t.name}</div>
        <input class="ak-score-input" type="number" min="0" step="0.5"
          placeholder="score"
          value="${sp.scores[ti] !== null ? sp.scores[ti] : ''}"
          oninput="akUpdateScore(${si},${ti},this.value)"
          id="ak-s${si}-t${ti}">
        <div class="ak-pts-preview" id="ak-pts-${si}-${ti}">${pts !== null ? pts+'kp' : ''}</div>
      </div>`;
    });

    html += `</div>`;
  });

  // Totaalbalk + naar teamklassement knop
  const totalen = akTotaalPunten();
  const allDone = ACHTKAMP.subspellen.every(sp => sp.scores.every(s => s !== null));
  html += `<div class="card" style="margin-top:4px">
    <div class="card-title">Totaalstand (live)</div>`;
  const rows = TEAMS.map((t,i) => ({...t, tot: totalen[i]})).sort((a,b)=>b.tot-a.tot);
  const maxTot = rows[0]?.tot || 1;
  rows.forEach((t,i) => {
    const rang = rows.filter(r=>r.tot>t.tot).length+1;
    const medal = rang===1?'🥇':rang===2?'🥈':rang===3?'🥉':'';
    html += `<div class="lb-row rank-${rang<=3?rang:99}">
      <div class="rank-num">${rang}</div>
      <div class="rank-medal">${medal}</div>
      <div class="rank-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.color};margin-right:6px"></span>${t.name}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(t.tot/maxTot*100)}%;background:${t.color}"></div></div>
      <div class="rank-pts">${t.tot}kp</div>
    </div>`;
  });

  if(ACHTKAMP.verwerkt) {
    html += `<div class="alert alert-success" style="margin-top:12px">✓ Eindstand al doorgestuurd naar Teamklassement.</div>`;
  } else {
    html += `<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      ${allDone ? `<button class="btn btn-primary" onclick="akNaarTeamklassement()">🏆 Eindstand doorsturen naar Teamklassement</button>` : `<button class="btn btn-outline" disabled style="opacity:.5;cursor:not-allowed">🏆 Vul alle 8 spellen in om door te sturen</button>`}
    </div>`;
  }
  html += `</div>`;

  el.innerHTML = html;
}

function akUpdateScore(si, ti, val) {
  const v = val === '' ? null : parseFloat(val);
  ACHTKAMP.subspellen[si].scores[ti] = isNaN(v) ? null : v;
  // Update alleen de preview-punten van dit subspel (zonder volledige re-render)
  const kPts = akSubPunten(ACHTKAMP.subspellen[si].scores);
  TEAMS.forEach((t, i) => {
    const el = document.getElementById(`ak-pts-${si}-${i}`);
    if(el) el.textContent = kPts[i] !== null ? kPts[i]+'kp' : '';
  });
  // Update totaalstand live
  renderAkInvoer();
}

function akNaarTeamklassement() {
  const totalen = akTotaalPunten();
  const kPts = rawScoresToKlassementPunten(totalen);
  GAME_HISTORY.push({
    name: ACHTKAMP.naam,
    klassement: 'Teamklassement',
    type: '8kamp',
    date: '—', time: '—',
    scores: kPts,
    rawScores: totalen,
    ak8: true
  });
  ACHTKAMP.verwerkt = true;
  showToast('🏆 8-Kamp eindstand toegevoegd aan Teamklassement!');
  renderAchtkamp();
  renderTeamKlassement();
  document.getElementById('dash-spellen').textContent = GAME_HISTORY.length;
}

function renderAkStand() {
  const el = document.getElementById('ak-stand');
  if(!el) return;
  const totalen = akTotaalPunten();
  const rows = TEAMS.map((t,i)=>({...t,tot:totalen[i]})).sort((a,b)=>b.tot-a.tot);
  const maxTot = rows[0]?.tot || 1;
  let html = '';
  rows.forEach(t => {
    const rang = rows.filter(r=>r.tot>t.tot).length+1;
    const medal = rang===1?'🥇':rang===2?'🥈':rang===3?'🥉':'';
    html += `<div class="lb-row rank-${rang<=3?rang:99}">
      <div class="rank-num">${rang}</div><div class="rank-medal">${medal}</div>
      <div class="rank-name"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${t.color};margin-right:7px"></span>${t.name}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(t.tot/maxTot*100)}%;background:${t.color}"></div></div>
      <div class="rank-pts">${t.tot}kp <span style="font-size:.72rem;color:var(--muted)">totaal</span></div>
    </div>`;
  });
  if(ACHTKAMP.verwerkt) html += `<div class="alert alert-success" style="margin-top:12px">✓ Verwerkt in Teamklassement.</div>`;
  el.innerHTML = html;
}

function renderAkDetail() {
  const el = document.getElementById('ak-detail');
  if(!el) return;

  // Tabel: rijen = subspellen, kolommen = teams
  let html = `<div class="gh-wrap"><table class="gh-table"><thead><tr><th>Sub-spel</th>`;
  TEAMS.forEach(t => { html += `<th class="pts-th"><span style="color:${t.color}">●</span> ${t.name.split(' ')[0]}</th>`; });
  html += `</tr></thead><tbody>`;

  ACHTKAMP.subspellen.forEach((sp, si) => {
    const kPts = akSubPunten(sp.scores);
    html += `<tr><td><strong>${si+1}. ${sp.naam}</strong></td>`;
    kPts.forEach((pts, ti) => {
      if(pts === null) {
        html += `<td class="pts-cell" style="color:var(--muted-light)">—</td>`;
      } else {
        const rang = kPts.filter(x=>x!==null&&x>pts).length+1;
        const cls = rang===1?'r1':rang===2?'r2':rang===3?'r3':'rx';
        const raw = sp.scores[ti];
        html += `<td class="pts-cell"><span class="rank-pill ${cls}">${rang}</span>${pts}kp<span style="color:var(--muted-light);font-size:.7rem;display:block">${raw} pnt</span></td>`;
      }
    });
    html += `</tr>`;
  });

  // Totaalrij
  const totalen = akTotaalPunten();
  html += `<tr class="total-row"><td><strong>Totaal</strong></td>`;
  totalen.forEach(tot => { html += `<td class="pts-cell">${tot}kp</td>`; });
  html += `</tr></tbody></table></div>`;
  el.innerHTML = html;
}
function openModal(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// Vanuit planning naar 8-kamp sectie springen
function openAkVanuitPlanning(naam, tijd){
  // Werk de 8-kamp naam bij als die van de planning afwijkt
  if(naam && naam !== ACHTKAMP.naam) ACHTKAMP.naam = naam;
  // Navigeer naar 8-kamp sectie, open invoer tab
  const btn = document.querySelector('.nav-btn[onclick*="achtkamp"]');
  showSection('achtkamp', btn);
  // Zorg dat invoer tab actief is
  const akSection = document.getElementById('section-achtkamp');
  akSection.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  akSection.querySelectorAll('.tab')[0].classList.add('active');
  ['ak-stand','ak-detail'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  document.getElementById('ak-invoer').style.display='block';
}

// ── INIT ─────────────────────────────────────────────────────
renderDashboard();
</script>
</body>
</html>
